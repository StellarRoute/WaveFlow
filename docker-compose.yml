# Local development dependencies for WaveFlow gateway and API services.
services:
  postgres:
    image: postgres:16-alpine
    container_name: waveflow-postgres
    environment:
      POSTGRES_USER: waveflow
      POSTGRES_PASSWORD: waveflow
      POSTGRES_DB: waveflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waveflow -d waveflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  waveflow-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: waveflow-gateway
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://waveflow:waveflow@postgres:5432/waveflow
      GATEWAY_PORT: "8080"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  waveflow-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: waveflow-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://waveflow:waveflow@postgres:5432/waveflow
      API_PORT: "8081"
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
