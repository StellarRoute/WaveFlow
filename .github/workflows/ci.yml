# CI pipeline: format, lint, and test the WaveFlow Rust workspace.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: waveflow
          POSTGRES_PASSWORD: waveflow
          POSTGRES_DB: waveflow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U waveflow -d waveflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        env:
          DATABASE_URL: postgres://waveflow:waveflow@localhost:5433/waveflow
        run: cargo test --workspace
