# Render Blueprint for WaveFlow gateway, API, and Postgres services.
services:
  - type: web
    name: waveflow-gateway
    runtime: docker
    dockerfilePath: Dockerfile.gateway
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waveflow-db
          property: connectionString
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: WAVEFLOW_ENV
        value: production
      - key: SOROBAN_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: ESCROW_CONTRACT_ID
        sync: false
      - key: GATEWAY_SECRET_KEY
        sync: false
      - key: PORT
        value: "8080"
    healthCheckPath: /health

  - type: web
    name: waveflow-api
    runtime: docker
    dockerfilePath: Dockerfile.api
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waveflow-db
          property: connectionString
      - key: API_ADMIN_KEYS
        sync: false
      - key: PORT
        value: "8081"
    healthCheckPath: /health

databases:
  - name: waveflow-db
    plan: starter
    databaseName: waveflow
    user: waveflow
